name: Ops NEop — Self Deploy

on:
  push:
    branches: [main, production]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".gitignore"

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: ops-neop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f agent/Dockerfile agent/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/main'
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          echo "Deploying $IMAGE_TAG to staging..."
          # Stakpak agent handles the actual deployment via MCP

      - name: Deploy to Production (with canary)
        if: github.ref == 'refs/heads/production'
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          echo "Deploying $IMAGE_TAG to production with canary strategy..."
          echo "Slack approval will be requested by the Ops agent"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_DEPLOY_CHANNEL }}
          slack-message: "Ops NEop deploy: ${{ job.status }} (${{ github.ref_name }}, ${{ github.sha }})"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
